services:
  neo4j:
    image: neo4j:community
    container_name: my-neo4j
    ports:
      - "7474:7474"   # 网页端访问端口
      - "7687:7687"   # 代码连接使用的 Bolt 端口
    environment:
      - NEO4J_AUTH=neo4j/password   # 设置默认的账号和密码，和你 Python 代码里保持一致
    volumes:
      - ./neo4j_data/data:/data       # 将数据挂载到本地，防止重启丢失
      - ./neo4j_data/logs:/logs